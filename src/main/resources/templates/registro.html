<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="/css/estilosLogin.css">

</head>

<body>

<div class="login-container">
    <div class="card login-card">

        <div class="card-body p-5">

            <a href="/" class="back-link">
                <i class="bi bi-arrow-left"></i>
            </a>

            <div class="text-center mb-5">

                <div class="icon-box mb-3">
                    <i class="bi bi-person-plus-fill"></i>
                </div>

                <h2 class="fw-bold text-white">Eventos PUCMM</h2>
                <p class="text-white">Crear cuenta</p>

            </div>

            <form method="post" action="/registro">

                <div class="mb-4">
                    <label class="form-label text-white-50">Nombre</label>

                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-white-50">
                        <i class="bi bi-person"></i>
                        </span>

                        <input type="text"
                               name="nombre"
                               class="form-control bg-transparent border-start-0 text-white"
                               placeholder="Tu nombre"
                               required>
                    </div>
                </div>


                <div class="mb-4">
                    <label class="form-label text-white-50">Correo</label>

                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-white-50">
                        <i class="bi bi-envelope"></i>
                        </span>

                        <input type="email"
                               name="email"
                               class="form-control bg-transparent border-start-0 text-white"
                               placeholder="correo@pucmm.edu.do"
                               required>
                    </div>
                </div>


                <div class="mb-4">
                    <label class="form-label text-white-50">Contraseña</label>

                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-white-50">
                        <i class="bi bi-lock"></i>
                        </span>

                        <input type="password"
                               name="contrasena"
                               class="form-control bg-transparent border-start-0 text-white"
                               placeholder="••••••••"
                               required>
                    </div>
                </div>


                <div class="mb-4">
                    <label class="form-label text-white-50">Confirmar contraseña</label>

                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-white-50">
                        <i class="bi bi-lock-fill"></i>
                        </span>

                        <input type="password"
                               name="confirmar"
                               class="form-control bg-transparent border-start-0 text-white"
                               placeholder="••••••••"
                               required>
                    </div>
                </div>


                <button type="submit" class="btn btn-gradient w-100 py-2 fw-bold">
                    REGISTRARSE
                </button>

            </form>

            <div class="text-center mt-4">

                <p class="text-white-50">
                    ¿Ya tienes cuenta?
                    <a href="/login" class="text-white fw-bold text-decoration-none">
                        Inicia sesión
                    </a>
                </p>

            </div>

        </div>
    </div>
</div>

</body>
</html>
