<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estadísticas del evento</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/estilosAdmin.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand d-flex align-items-center">
      <i class="bi bi-bar-chart-line me-2"></i>
      Estadísticas del Evento
    </span>
    <div class="d-flex gap-2">
      <a href="/eventos" class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left me-1"></i> Volver
      </a>
      <a href="/logout" class="btn btn-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i> Salir
      </a>
    </div>
  </div>
</nav>

<div class="admin-layout">

  <aside class="sidebar">
    <div class="sidebar-title">Menú</div>
    <a class="sidebar-link active" href="/eventos"><i class="bi bi-calendar-event"></i> Eventos</a>
  </aside>

  <main class="main">

    <!-- info del evento -->
    <div class="card shadow-sm mb-4 border-0">
      <div class="event-banner rounded-top position-relative">
        <i class="bi bi-calendar-event event-icon"></i>
      </div>
      <div class="card-body">
        <h1 class="h4 mb-2" id="eventoTitulo">Cargando...</h1>
        <div class="text-muted mb-3" id="eventoDescripcion">—</div>
        <div class="d-flex flex-wrap gap-3 small text-muted">
          <span><i class="bi bi-calendar-date me-1"></i><span id="eventoFecha">—</span></span>
          <span><i class="bi bi-clock me-1"></i><span id="eventoHora">—</span></span>
          <span><i class="bi bi-geo-alt me-1"></i><span id="eventoLugar">—</span></span>
          <span><i class="bi bi-person-badge me-1"></i><span id="eventoOrganizador">—</span></span>
        </div>
      </div>
    </div>

    <!-- alerta de error -->
    <div id="alertaError" class="alert alert-danger d-none" role="alert">
      <i class="bi bi-exclamation-triangle me-2"></i>
      <span id="mensajeError"></span>
    </div>

    <!-- tarjetas -->
    <div class="row g-3 mb-4">
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card stat-card shadow-sm h-100">
          <div class="card-body">
            <div class="stat-label">Total inscritos</div>
            <div class="stat-value" id="totalInscritos">—</div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card stat-card shadow-sm h-100">
          <div class="card-body">
            <div class="stat-label">Total asistentes</div>
            <div class="stat-value" id="totalAsistentes">—</div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card stat-card shadow-sm h-100">
          <div class="card-body">
            <div class="stat-label">% asistencia</div>
            <div class="stat-value" id="pctAsistencia">—</div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-xl-3">
        <div class="card stat-card shadow-sm h-100">
          <div class="card-body">
            <div class="stat-label">% ocupación</div>
            <div class="stat-value" id="pctOcupacion">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- graficos -->
    <div class="row g-4">

      <div class="col-12 col-xl-6">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white fw-semibold">Inscripciones por día</div>
          <div class="card-body p-3">
            <div id="spinnerInscripciones" class="spinner-overlay">
              <div class="spinner-border text-secondary" role="status"></div>
            </div>
            <div id="placeholderInscripciones" class="chart-placeholder d-none">
              <i class="bi bi-bar-chart-line" style="font-size:40px;"></i>
              <div class="mt-2">Sin datos de inscripciones</div>
            </div>
            <canvas id="graficoInscripciones" class="d-none"></canvas>
          </div>
        </div>
      </div>

      <div class="col-12 col-xl-6">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white fw-semibold">Asistencia por hora</div>
          <div class="card-body p-3">
            <div id="spinnerAsistencia" class="spinner-overlay">
              <div class="spinner-border text-secondary" role="status"></div>
            </div>
            <div id="placeholderAsistencia" class="chart-placeholder d-none">
              <i class="bi bi-graph-up" style="font-size:40px;"></i>
              <div class="mt-2">Sin datos de asistencia</div>
            </div>
            <canvas id="graficoAsistencia" class="d-none"></canvas>
          </div>
        </div>
      </div>

    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- ID del evento inyectado por Thymeleaf -->
<script th:inline="javascript">
  window.__EVENTO_ID__ = /*[[${idEvento}]]*/ 1;
</script>
<script src="/js/estadisticas.js"></script>

</body>
</html>
