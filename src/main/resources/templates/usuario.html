<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosAdmin.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
    <span class="navbar-brand d-flex align-items-center">
      <i class="bi bi-people me-2"></i>
      Administración - Usuarios
    </span>
        <a href="/admin" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
    </div>
</nav>

<div class="admin-layout">

    <aside class="sidebar">
        <div class="sidebar-title">Menú</div>

        <a class="sidebar-link" href="/admin">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a class="sidebar-link" href="/eventos">
            <i class="bi bi-calendar-event"></i> Eventos
        </a>

        <a class="sidebar-link active" href="/usuarios">
            <i class="bi bi-people"></i> Usuarios
        </a>
    </aside>

    <main class="main">

        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <span class="fw-semibold">Usuarios</span>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="u : ${usuarios}">
                            <td th:text="${u.nombre}"></td>
                            <td th:text="${u.email}"></td>
                            <td>

                                <span class="badge bg-dark" th:text="${u.rol}"></span>

                                <span class="badge bg-danger"
                                      th:if="${u.bloqueado}">
                                         Bloqueado
                                </span>

                            </td>
                            <td class="text-end">
                                <form th:action="'/usuarios/bloquear/' + ${u.idUsuario}" method="post" style="display:inline">
                                    <button class="btn btn-sm btn-warning">
                                        <i class="bi bi-lock"></i>
                                    </button>

                                </form>

                            </td>

                        </tr>

                        </tbody>

                    </table>
                </div>
            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
