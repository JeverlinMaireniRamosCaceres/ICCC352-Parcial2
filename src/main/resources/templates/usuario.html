<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosAdmin.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand d-flex align-items-center">
            <i class="bi bi-people me-2"></i>
            Administración - Usuarios
        </span>
        <a href="/admin" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
    </div>
</nav>

<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-title">Menú</div>
        <a class="sidebar-link" href="/admin">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a class="sidebar-link" href="/eventos">
            <i class="bi bi-calendar-event"></i> Eventos
        </a>
        <a class="sidebar-link active" href="/usuarios">
            <i class="bi bi-people"></i> Usuarios
        </a>
    </aside>

    <main class="main">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <span class="fw-semibold">Usuarios</span>
                <button class="btn btn-dark btn-sm" data-bs-toggle="modal" data-bs-target="#usuarioModal">
                    <i class="bi bi-plus-lg me-1"></i> Nuevo usuario
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${usuarios}">
                            <td th:text="${u.nombre}"></td>
                            <td th:text="${u.email}"></td>
                            <td>
                                <span class="badge bg-dark" th:text="${u.rol}"></span>
                                <span class="badge bg-danger" th:if="${u.bloqueado}">Bloqueado</span>
                            </td>
                            <td class="text-end">
                                <a class="btn btn-sm btn-primary" title="Editar usuario"
                                   th:if="${u.rol != 'ADMIN'}"
                                   th:href="@{'/usuarios/editar/' + ${u.idUsuario}}">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:if="${u.rol != 'ADMIN'}" th:action="@{'/usuarios/bloquear/' + ${u.idUsuario}}" method="post" style="display:inline">
                                    <button class="btn btn-sm"
                                            th:classappend="${u.bloqueado} ? 'btn-success' : 'btn-warning'">
                                        <i th:class="${u.bloqueado} ? 'bi bi-unlock' : 'bi bi-lock'"></i>
                                    </button>
                                </form>
                                <form th:if="${u.rol != 'ADMIN'}" th:action="@{'/usuarios/eliminar/' + ${u.idUsuario}}" method="post" style="display:inline"
                                      onsubmit="return confirm('¿Está seguro que desea eliminar este usuario?')">
                                    <button class="btn btn-sm btn-danger" title="Eliminar usuario">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="usuarioModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Crear usuario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" action="/usuarios/crear">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="contrasena" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol</label>
                        <select name="rol" class="form-select">
                            <option value="PARTICIPANTE">Participante</option>
                            <option value="ORGANIZADOR">Organizador</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:if="${usuarioEditar != null}" class="modal fade show d-block" id="editarUsuarioModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar usuario</h5>
                <a href="/usuarios" class="btn-close"></a>
            </div>
            <form method="post" th:action="@{'/usuarios/editar/' + ${usuarioEditar.idUsuario}}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" th:value="${usuarioEditar.nombre}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" th:value="${usuarioEditar.email}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol</label>
                        <select name="rol" class="form-select">
                            <option value="PARTICIPANTE" th:selected="${usuarioEditar.rol == 'PARTICIPANTE'}">Participante</option>
                            <option value="ORGANIZADOR" th:selected="${usuarioEditar.rol == 'ORGANIZADOR'}">Organizador</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <a href="/usuarios" class="btn btn-secondary">Cancelar</a>
                    <button class="btn btn-success">Actualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
