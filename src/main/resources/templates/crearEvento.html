<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${modoEdicion} ? 'Editar evento' : 'Crear evento'">Crear evento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosAdmin.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand d-flex align-items-center">
            <i class="bi bi-plus-circle me-2"></i>
            <span th:text="${modoEdicion} ? 'Editar evento' : 'Crear / Editar evento'">Crear / Editar evento</span>
        </span>
        <a href="/eventos" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
    </div>
</nav>

<div class="admin-layout">

    <aside class="sidebar">
        <div class="sidebar-title">Menú</div>

        <a class="sidebar-link" href="/admin">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a class="sidebar-link"
           href="/admin"
           th:if="${usuarioLogueado != null and usuarioLogueado.rol == 'ADMIN'}">
            <i class="bi bi-calendar-event"></i> Eventos
        </a>

        <a class="sidebar-link"
           href="/usuarios"
           th:if="${usuarioLogueado != null and usuarioLogueado.rol == 'ADMIN'}">
            <i class="bi bi-people"></i> Usuarios
        </a>
    </aside>

    <main class="main">

        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h5 mb-3">Información del evento</h1>

                <form th:action="${modoEdicion} ? @{/eventos/{id}/editar(id=${evento.idEvento})} : @{/eventos/crear}" method="post">
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label">Título</label>
                            <input name="titulo" class="form-control" type="text" placeholder="Ej: Charla de IA"
                                   th:value="${evento != null ? evento.titulo : ''}" required>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label">Lugar</label>
                            <input name="lugar" class="form-control" type="text" placeholder="Ej: Auditorio A"
                                   th:value="${evento != null ? evento.lugar : ''}" required>
                        </div>

                        <div class="col-12 col-md-4">
                            <label class="form-label">Fecha</label>
                            <input name="fecha" class="form-control" type="date"
                                   th:value="${evento != null ? evento.fecha : ''}" required>
                        </div>

                        <div class="col-12 col-md-3">
                            <label class="form-label">Hora</label>
                            <input name="hora" class="form-control" type="time"
                                   th:value="${evento != null ? evento.hora : ''}" required>
                        </div>

                        <div class="col-12 col-md-3">
                            <label class="form-label">Cupo</label>
                            <input name="cupoMaximo" class="form-control" type="number" min="1" placeholder="Ej: 150"
                                   th:value="${evento != null ? evento.cupoMaximo : ''}" required>
                        </div>

                        <div class="col-12 col-md-2">
                            <label class="form-label">Estado</label>
                            <select name="estado" class="form-select" required>
                                <option value="">Estado</option>
                                <option value="BORRADOR" th:selected="${evento != null and evento.estado == 'BORRADOR'}">Borrador</option>
                                <option value="PUBLICADO" th:selected="${evento != null and evento.estado == 'PUBLICADO'}">Publicado</option>
                                <option value="FINALIZADO" th:selected="${evento != null and evento.estado == 'FINALIZADO'}">Finalizado</option>
                                <option value="CANCELADO" th:selected="${evento != null and evento.estado == 'CANCELADO'}">Cancelado</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Descripción</label>
                            <textarea name="descripcion" class="form-control" rows="4" placeholder="Describe el evento..."
                                      th:text="${evento != null ? evento.descripcion : ''}"></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="/eventos" class="btn btn-outline-secondary">Cancelar</a>
                        <button class="btn btn-dark" type="submit"
                                th:text="${modoEdicion} ? 'Actualizar' : 'Guardar'">Guardar</button>
                    </div>
                </form>

            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
