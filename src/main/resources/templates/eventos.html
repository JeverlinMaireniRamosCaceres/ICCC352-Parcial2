<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eventos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosAdmin.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand d-flex align-items-center">
            <i class="bi bi-calendar-event me-2"></i>
            Administración - Eventos
        </span>

        <div class="d-flex gap-2">
            <a href="/eventos/nuevo" class="btn btn-light btn-sm">
                <i class="bi bi-plus-lg me-1"></i> Nuevo evento
            </a>
            <a href="/logout" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i> Salir
            </a>
        </div>
    </div>
</nav>

<div class="admin-layout">

    <aside class="sidebar">
        <div class="sidebar-title">Menú</div>

        <a class="sidebar-link" href="/admin">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a class="sidebar-link active" href="/eventos">
            <i class="bi bi-calendar-event"></i> Eventos
        </a>

        <a class="sidebar-link" href="/usuarios">
            <i class="bi bi-people"></i> Usuarios
        </a>
    </aside>

    <main class="main">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h1 class="h4 mb-1">Eventos</h1>
                <div class="text-muted small">Estadísticas por evento</div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Evento</th>
                            <th>Fecha</th>
                            <th class="text-center">Inscritos</th>
                            <th class="text-center">Cupo</th>
                            <th class="text-center">% Ocupación</th>
                            <th class="text-center">Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="evento : ${eventos}">

                            <td>
                                <div class="fw-semibold" th:text="${evento.titulo}">Título del evento</div>
                                <div class="text-muted small" th:text="${evento.lugar}">Lugar del evento</div>
                            </td>

                            <td th:text="${evento.fecha}">2026-03-10</td>

                            <td class="text-center">0</td>

                            <td class="text-center" th:text="${evento.cupoMaximo}">150</td>

                            <td class="text-center">
                                <span class="badge badge-ocupacion">0%</span>
                            </td>

                            <td class="text-center">
                                <span class="badge"
                                      th:classappend="${
                                          evento.estado.toString() == 'PUBLICADO' ? ' bg-success-subtle text-success' :
                                          (evento.estado.toString() == 'FINALIZADO' ? ' bg-secondary-subtle text-secondary' :
                                          (evento.estado.toString() == 'CANCELADO' ? ' bg-danger-subtle text-danger' :
                                          ' bg-warning-subtle text-warning'))
                                      }"
                                      th:text="${evento.estado}">
                                    Estado
                                </span>
                            </td>

                            <td class="text-end">

                                <!-- Ver -->
                                <a class="btn btn-sm btn-outline-secondary"
                                   th:href="'/eventos/' + ${evento.idEvento}">
                                    <i class="bi bi-eye"></i>
                                </a>

                                <!-- Editar -->
                                <a class="btn btn-sm btn-outline-dark"
                                   th:href="'/eventos/' + ${evento.idEvento} + '/editar'">
                                    <i class="bi bi-pencil"></i>
                                </a>

                                <!-- Cancelar (solo si NO está cancelado) -->
                                <form th:if="${evento.estado != 'CANCELADO'}"
                                      th:action="'/eventos/' + ${evento.idEvento} + '/cancelar'"
                                      method="post"
                                      style="display:inline">

                                    <button type="submit"
                                            class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('¿Seguro que deseas cancelar este evento?')">

                                        <i class="bi bi-x-circle"></i>

                                    </button>

                                </form>

                            </td>

                        </tr>
                        </tbody>

                    </table>
                </div>
            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
