<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Escanear QR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <i class="bi bi-calendar-event-fill me-2"></i>
            <strong>Eventos PUCMM</strong>
        </a>

        <a href="/scanner/eventos" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left me-1"></i>
            Volver
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <div class="card shadow border-0">
                <div class="card-body text-center p-4">

                    <input type="hidden" id="idEvento" th:value="${evento.idEvento}">

                    <h3 class="mb-2">
                        <i class="bi bi-qr-code-scan"></i>
                        Escanear código QR
                    </h3>

                    <p class="text-muted mb-4">
                        Evento:
                        <strong th:text="${evento.titulo}">Nombre del evento</strong>
                    </p>

                    <div id="reader" style="width:100%; max-width:400px; margin:auto;"></div>

                    <p class="text-muted mt-3 mb-0">
                        Apunta la cámara al QR del participante
                    </p>

                    <div id="resultado" class="mt-3"></div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="/js/scanner.js"></script>

</body>
</html>
