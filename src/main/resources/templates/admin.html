<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel de administracion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosAdmin.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
    <span class="navbar-brand d-flex align-items-center">
      <i class="bi bi-speedometer2 me-2"></i>
      Panel de Administración
    </span>

        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-light btn-sm">
                <i class="bi bi-house-door me-1"></i> Inicio
            </a>
            <a href="/logout" class="btn btn-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i> Salir
            </a>
        </div>
    </div>
</nav>

<div class="admin-layout">

    <aside class="sidebar">
        <div class="sidebar-title">Menú</div>

        <a class="sidebar-link active" href="/admin">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a class="sidebar-link" href="/eventos">
            <i class="bi bi-calendar-event"></i> Eventos
        </a>

        <a class="sidebar-link" href="/usuarios">
            <i class="bi bi-people"></i> Usuarios
        </a>
    </aside>

    <main class="main">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h4 mb-1">Panel de administracion</h1>
                <div class="text-muted small">Resumen general</div>
            </div>

            <a href="/admin/eventos/nuevo" class="btn btn-dark">
                <i class="bi bi-plus-lg me-1"></i> Nuevo evento
            </a>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-12 col-md-6 col-xl-3">
                <div class="card stat-card shadow-sm">
                    <div class="card-body">
                        <div class="stat-label">Total eventos</div>
                        <div class="stat-value" id="totalEventos">—</div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="card stat-card shadow-sm">
                    <div class="card-body">
                        <div class="stat-label">Eventos próximos</div>
                        <div class="stat-value" id="eventosProximos">—</div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="card stat-card shadow-sm">
                    <div class="card-body">
                        <div class="stat-label">Usuarios</div>
                        <div class="stat-value" id="totalUsuarios">—</div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="card stat-card shadow-sm">
                    <div class="card-body">
                        <div class="stat-label">Inscripciones (30 días)</div>
                        <div class="stat-value" id="inscripciones30dias">—</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <span class="fw-semibold">Accesos rápidos</span>
            </div>

            <div class="card-body">
                <div class="d-flex flex-wrap gap-2">
                    <a href="/eventos" class="btn btn-outline-secondary">
                        <i class="bi bi-calendar-event me-1"></i> Gestionar eventos
                    </a>
                    <a href="/usuarios" class="btn btn-outline-secondary">
                        <i class="bi bi-people me-1"></i> Ver usuarios
                    </a>
                </div>
            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
