<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Index</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/estilosIndex.css">
</head>

<body>

<header>
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a href="/" class="navbar-brand d-flex align-items-center">
                <i class="bi bi-calendar-event-fill me-2"></i>
                <strong>Eventos PUCMM</strong>
            </a>

            <div class="d-flex align-items-center gap-2">

                <!-- ADMIN -->
                <div th:if="${usuarioLogueado != null and usuarioLogueado.rol == 'ADMIN'}" class="d-flex gap-2">
                    <a href="/admin" class="btn btn-light btn-sm">
                        <i class="bi bi-gear-fill me-1"></i>
                        Administración
                    </a>

                    <a href="/logout" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        Salir
                    </a>
                </div>

                <!-- PARTICIPANTE -->
                <div th:if="${usuarioLogueado != null and usuarioLogueado.rol == 'PARTICIPANTE'}"
                     class="dropdown">
                    <button class="btn btn-light btn-sm dropdown-toggle"
                            type="button"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${usuarioLogueado.nombre}">Usuario</span>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="/misEventos">
                                <i class="bi bi-calendar-check me-2"></i>
                                Mis eventos
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <a class="dropdown-item text-danger" href="/logout">
                                <i class="bi bi-box-arrow-right me-2"></i>
                                Salir
                            </a>
                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </nav>
</header>

<main>

    <section class="py-5 text-center bg-light">
        <div class="container">
            <h1 class="fw-light">Eventos disponibles</h1>
            <p class="lead text-muted">
                Consulta los eventos publicados y revisa sus detalles.
            </p>

            <!-- SOLO SI NO HA INICIADO SESION -->
            <p th:if="${usuarioLogueado == null}">
                <a href="/login" class="btn btn-dark my-2">Iniciar sesión</a>
                <a href="/registro" class="btn btn-secondary my-2">Registrarse</a>
            </p>
        </div>
    </section>

    <div class="album py-5 bg-body-tertiary">
        <div class="container">

            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">

                <div class="col" th:each="evento : ${eventos}">
                    <div class="card shadow-sm h-100">

                        <div class="card-img-top event-banner d-flex justify-content-center align-items-center">
                            <i class="bi bi-calendar-event-fill event-icon"></i>
                        </div>

                        <div class="card-body">
                            <h5 class="card-title" th:text="${evento.titulo}">Título del evento</h5>

                            <p class="card-text mb-0">
                                <strong>Fecha:</strong>
                                <span th:text="${evento.fecha}">2026-03-10</span>
                            </p>
                        </div>

                        <div class="card-footer bg-white border-0">
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="btn-group">
                                    <a th:href="'/evento/' + ${evento.idEvento}"
                                       class="btn btn-sm btn-outline-secondary">
                                        Ver
                                    </a>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>

            <!-- PAGINACION -->
            <div class="d-flex justify-content-center mt-5">
                <nav aria-label="Paginación de eventos">
                    <ul class="pagination pagination-sm shadow-sm">

                        <li class="page-item" th:classappend="${currentPage == 1} ? ' disabled'">
                            <a class="page-link"
                               th:href="'/?page=' + (${currentPage} - 1)">
                                Anterior
                            </a>
                        </li>

                        <li class="page-item disabled">
                            <span class="page-link bg-dark text-white border-dark">
                                Página <span th:text="${currentPage}">1</span> de <span th:text="${totalPages}">1</span>
                            </span>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages} ? ' disabled'">
                            <a class="page-link"
                               th:href="'/?page=' + (${currentPage} + 1)">
                                Siguiente
                            </a>
                        </li>

                    </ul>
                </nav>
            </div>

        </div>
    </div>

</main>

<footer class="text-muted py-5">
    <div class="container">
        <p class="float-end mb-1"><a href="#" class="text-decoration-none">Volver al inicio</a></p>
        <p class="mb-1">Eventos PUCMM &copy; 2026</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
